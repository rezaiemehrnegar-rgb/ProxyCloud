name: flutter_v2ray_client
description: Flutter client plugin for Xray/V2Ray on Android (VPN mode & proxy-only) with modernized API and docs.

topics:
  - vpn
  - v2ray
  - xray
  - proxy

version: 1.1.2
homepage: https://github.com/amir-zr/flutter_v2ray_client
repository: https://github.com/amir-zr/flutter_v2ray_client
issue_tracker: https://github.com/amir-zr/flutter_v2ray_client/issues

funding:
  - https://nowpayments.io/donation?api_key=1194fbf5-0420-4156-bc86-2d49033517c5

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: any

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: dev.amirzr.flutter_v2ray_client
        pluginClass: FlutterV2rayPlugin
      ios:
        pluginClass: FlutterV2rayPlugin

