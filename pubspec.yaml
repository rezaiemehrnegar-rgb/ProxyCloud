name: proxycloud
description: "A modern, feature-rich VPN client that's fast, unlimited, secure, and completely free."

publish_to: "none"

version: 3.9.0+55

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  easy_localization: ^3.0.8
  flutter_v2ray_client:
    path: local_packages/flutter_v2ray_client
  http: ^1.6.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  flutter_svg: ^2.3.0
  url_launcher: ^6.3.2
  flutter_spinkit: ^5.2.2
  clipboard: ^3.0.14
  path_provider: ^2.1.6
  google_fonts: ^8.2.0
  lottie: ^3.5.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  intl: any
  webview_flutter: ^4.14.1
  file_picker: ^11.0.2
  permission_handler: ^12.0.3
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/languages/

